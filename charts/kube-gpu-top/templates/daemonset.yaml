apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-gpu-agent
  namespace: {{ .Values.namespace }}
  labels:
    app: kube-gpu-agent
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  selector:
    matchLabels:
      app: kube-gpu-agent
  template:
    metadata:
      labels:
        app: kube-gpu-agent
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.agentPort }}
              name: grpc
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: false
            capabilities:
              add:
                - SYS_ADMIN
          volumeMounts:
            - name: pod-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
            - name: nvidia-driver
              mountPath: /usr/lib/x86_64-linux-gnu
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: pod-resources
          hostPath:
            path: {{ .Values.podResourcesPath }}
        - name: nvidia-driver
          hostPath:
            path: {{ .Values.nvidiaDriverPath }}
