apiVersion: v1
kind: Namespace
metadata:
  name: kube-gpu-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-gpu-agent
  namespace: kube-gpu-system
  labels:
    app: kube-gpu-agent
spec:
  selector:
    matchLabels:
      app: kube-gpu-agent
  template:
    metadata:
      labels:
        app: kube-gpu-agent
    spec:
      nodeSelector:
        # Only schedule on nodes with NVIDIA GPUs
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: agent
          image: ghcr.io/jiazhougao/kube-gpu-agent:latest
          ports:
            - containerPort: 9401
              name: grpc
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: false
            capabilities:
              add:
                - SYS_ADMIN  # Required for NVML access
          volumeMounts:
            - name: pod-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
            - name: nvidia-driver
              mountPath: /usr/lib/x86_64-linux-gnu
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: pod-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources
        - name: nvidia-driver
          hostPath:
            path: /usr/lib/x86_64-linux-gnu
