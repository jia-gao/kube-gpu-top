name: Release

# Triggered on version tag push (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
#
# Produces:
#   1. GitHub release with kubectl-gpu-top_<tag>_<os>_<arch>.tar.gz tarballs
#      (linux/darwin × amd64/arm64) and a checksums.txt — consumed by Krew.
#   2. Multi-arch agent container image at ghcr.io/jia-gao/kube-gpu-agent:<tag>
#      (and :latest), built from Dockerfile.agent.
#
# After this workflow finishes, update plugins/gpu-top.yaml with the four
# sha256 values from the release's checksums.txt and open a PR against
# kubernetes-sigs/krew-index.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist, e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: CLI tarballs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # GoReleaser needs full history for the changelog.
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  agent-image:
    name: Agent container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jia-gao/kube-gpu-agent:${{ steps.version.outputs.version }}
            ghcr.io/jia-gao/kube-gpu-agent:latest
          labels: |
            org.opencontainers.image.source=https://github.com/jia-gao/kube-gpu-top
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
